<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendolyne</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #f3a683, #f7d794);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

      
        .message {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 3rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 0;
            letter-spacing: 2px;
        }

        
        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 223, 128, 0.3) 0%, rgba(255, 138, 79, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 4;
        }

     
        .stem {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg); /* Ligera inclinación */
            width: 6px;
            height: 38vh;
            /* Degradado lateral para dar volumen (luz y sombra) */
            background: linear-gradient(to right, #1a3015 0%, #3d6b35 50%, #24421d 100%);
            border-radius: 50% 50% 0 0 / 10% 10% 0 0; /* Punta más fina */
            z-index: 2;
            box-shadow: inset -1px 0 3px rgba(255,255,255,0.2); /* Reflejo de luz solar */
        }

       
        .grass {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: #1a3015;
            filter: blur(8px);
            z-index: 1;
            opacity: 0.6;
        }

        /* --- NUEVO ELEMENTO POST-IT (UX/UI) --- */
        .postit-link {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: #fffa90;
            z-index: 10;
            display: block;
            text-decoration: none;
            box-shadow: -2px 2px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            transform: rotate(-3deg);
        }

        /* Simulación de esquina inferior derecha doblada */
        .postit-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            border-width: 12px 12px 0 0;
            border-style: solid;
            border-color: #e6df6d #1e3c72 #1e3c72 #e6df6d; 
            display: block;
            width: 0;
            box-shadow: -1px -1px 2px rgba(0,0,0,0.1);
        }

        /* Líneas internas para que parezca una nota */
        .postit-link::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 8px;
            width: 34px;
            height: 2px;
            background: rgba(0, 0, 0, 0.15);
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15), 0 16px 0 rgba(0, 0, 0, 0.15);
        }

        /* Efecto feedback al pasar el ratón */
        .postit-link:hover {
            transform: scale(1.08) rotate(0deg);
            box-shadow: -4px 4px 10px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <!-- Nuevo enlace post-it -->
    <a href="post.html" class="postit-link" title="Ver notas"></a>

    <div class="message">Te quiero Wendolyne</div>
    <div class="grass"></div>
    <div class="stem"></div>
    <canvas id="dandelionCanvas"></canvas>

    <script>
        const canvas = document.getElementById('dandelionCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        const particleCount = 200;

        class Particle {
            constructor() {
                this.init();
            }

            init() {
             
                const centerX = canvas.width / 2 - 5; 
                const centerY = canvas.height - (canvas.height * 0.38);

                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 45;
                
                this.x = centerX + Math.cos(angle) * radius;
                this.y = centerY + Math.sin(angle) * radius;
                
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.98;
                this.gravity = -0.012;
                
                this.isFlying = false;
                this.opacity = 1;
                this.size = Math.random() * 1.2 + 1;
                this.time = Math.random() * 100;
                this.rotation = Math.random() * Math.PI;
            }

            update(mouse) {
                if (!this.isFlying) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 65) {
                        this.isFlying = true;
                        this.vx = (this.x - mouse.x) * 0.1 + (Math.random() * 2);
                        this.vy = (this.y - mouse.y) * 0.1 - (Math.random() * 1.5);
                    }
                } else {
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.vy += this.gravity;

                    this.x += this.vx + Math.sin(this.time * 0.07) * 0.5;
                    this.y += this.vy + Math.cos(this.time * 0.07) * 0.3;
                    
                    this.time += 0.1;
                    this.opacity -= 0.002;

                    if (this.opacity <= 0) this.init();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                
                if (this.isFlying) {
                    ctx.rotate(Math.atan2(this.vy, this.vx) + Math.PI/2);
                } else {
                    ctx.rotate(this.rotation);
                }
                
                ctx.strokeStyle = 'rgba(255, 253, 240, 0.8)';
                ctx.lineWidth = 0.5;

                for(let i = 0; i < 6; i++) {
                    ctx.rotate(Math.PI / 3);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, this.size * 5);
                    ctx.stroke();
                }

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 0.7, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function setup() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(mouse);
                p.draw();
            });
            requestAnimationFrame(loop);
        }

        setup();
        loop();
    </script>

    <!-- https://antondev14.github.io/Wendolyne/post.html -->

</body>
</html>
